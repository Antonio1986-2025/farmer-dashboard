<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgroSinal — Seu Perfil</title>
    <meta name="theme-color" content="#1a472a">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0d2818, #1a472a, #2d6a4f);
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
            padding: 16px;
        }
        .card {
            background: white; border-radius: 16px; padding: 32px 28px;
            max-width: 600px; width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .card h1 {
            font-size: 22px; color: #1a472a; margin-bottom: 4px;
        }
        .card .sub {
            font-size: 13px; color: #666; margin-bottom: 24px;
            line-height: 1.4;
        }
        .pergunta {
            margin-bottom: 20px; padding-bottom: 16px;
            border-bottom: 1px solid #eee;
        }
        .pergunta:last-child { border-bottom: none; margin-bottom: 0; }
        .pergunta .rotulo {
            font-size: 13px; font-weight: 600; color: #1a472a;
            margin-bottom: 8px;
        }
        .pergunta .texto {
            font-size: 14px; color: #333; margin-bottom: 10px;
        }
        .opcoes { display: flex; flex-direction: column; gap: 6px; }
        .opcao {
            display: flex; align-items: center; gap: 10px;
            padding: 10px 14px; border: 2px solid #e0e0e0;
            border-radius: 10px; cursor: pointer;
            transition: all 0.2s; font-size: 14px; color: #333;
        }
        .opcao:hover { border-color: #2d6a4f; background: #f0fff4; }
        .opcao.selecionada {
            border-color: #1a472a; background: #e8f5e9;
            font-weight: 600;
        }
        .opcao input[type="radio"] {
            accent-color: #1a472a; width: 16px; height: 16px;
            flex-shrink: 0;
        }
        .btn {
            width: 100%; margin-top: 20px;
            padding: 14px; border: none; border-radius: 12px;
            font-size: 16px; font-weight: 700; cursor: pointer;
            transition: all 0.2s;
            background: linear-gradient(135deg, #1a472a, #2d6a4f);
            color: white;
        }
        .btn:hover { transform: translateY(-1px); box-shadow: 0 4px 15px rgba(26,71,42,0.3); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .btn.secundario {
            background: #f5f5f5; color: #333; margin-top: 8px;
        }
        .resultado {
            display: none; text-align: center; padding: 16px;
        }
        .resultado .icone { font-size: 48px; margin-bottom: 8px; }
        .resultado h2 { font-size: 20px; color: #1a472a; }
        .resultado .desc { font-size: 14px; color: #555; margin: 8px 0 16px; line-height: 1.5; }
        .erro { color: #e74c3c; font-size: 12px; margin-top: 8px; display: none; text-align: center; }
        .progresso {
            text-align: center; font-size: 11px; color: #999; margin-bottom: 8px;
        }
    </style>
</head>
<body>
<div class="card" id="app">
    <div id="tela-perguntas">
        <h1>🔍 Seu Perfil de Operação</h1>
        <div class="sub">
            Responda 5 perguntas rápidas para personalizar o AgroSinal para você.
            Seus alertas, dashboard e sinais serão ajustados ao seu perfil.
        </div>
        <div class="progresso" id="progresso">Pergunta 1 de 5</div>

        <div id="pergunta-container"></div>
        <div class="erro" id="erro-msg">Selecione uma opção para continuar</div>
        <button class="btn" id="btn-proximo" onclick="proximo()">Próximo →</button>
        <button class="btn secundario" id="btn-pular" onclick="pular()" style="display:none;">
            Pular, vou definir depois
        </button>
    </div>

    <div class="resultado" id="tela-resultado">
        <div class="icone" id="resultado-icone"></div>
        <h2 id="resultado-titulo"></h2>
        <div class="desc" id="resultado-desc"></div>
        <button class="btn" onclick="irDashboard()">✅ Ir para o Dashboard</button>
        <button class="btn secundario" onclick="voltarPerguntas()">↩️ Responder novamente</button>
    </div>
</div>

<script>
const PERGUNTAS = [
    {
        id: "q1",
        texto: "Qual sua atividade principal?",
        opcoes: [
            { v: "a", label: "🧑‍🌾 Produzo milho/boi (produtor rural)" },
            { v: "b", label: "📦 Compro e vendo físico (atravessador, frigorífico)" },
            { v: "c", label: "📈 Opero contratos futuros na B3" },
            { v: "d", label: "⚡ Faço day trade / operação curta" },
            { v: "e", label: "🏭 Represento indústria/exportador (hedge)" },
        ]
    },
    {
        id: "q2",
        texto: "Quando monta uma posição, quanto tempo geralmente fica nela?",
        opcoes: [
            { v: "a", label: "⏱️ Algumas horas / no máximo 1 dia" },
            { v: "b", label: "📅 De 2 a 10 dias" },
            { v: "c", label: "📆 De 10 a 30 dias" },
            { v: "d", label: "🗓️ Mais de 30 dias" },
            { v: "e", label: "👀 Não opero posição, só acompanho" },
        ]
    },
    {
        id: "q3",
        texto: "O que te faria sair de uma operação?",
        opcoes: [
            { v: "a", label: "🟢 Perda de 1-2% — não gosto de risco" },
            { v: "b", label: "🟡 Perda de 3-5% — aceito oscilar" },
            { v: "c", label: "🟠 Perda de 5-10% — acreditava no movimento" },
            { v: "d", label: "🔴 Só saio se o cenário mudar totalmente" },
            { v: "e", label: "🤷 Não opero, só acompanho" },
        ]
    },
    {
        id: "q4",
        texto: "Qual informação é mais importante pra você?",
        opcoes: [
            { v: "a", label: "📊 Preço e variação do dia" },
            { v: "b", label: "📈 Tendência de curto prazo (3-10 dias)" },
            { v: "c", label: "📉 Cenário de médio prazo (10-30 dias)" },
            { v: "d", label: "🌾 Safra, clima, oferta/demanda" },
            { v: "e", label: "💵 Dólar, CBOT, relação boi/milho" },
        ]
    },
    {
        id: "q5",
        texto: "O que você espera do AgroSinal?",
        opcoes: [
            { v: "a", label: "💰 Saber o melhor momento de vender minha produção" },
            { v: "b", label: "📦 Alertas pra comprar/vender físico no curto prazo" },
            { v: "c", label: "📊 Sinais de entrada/saída pra operar na B3" },
            { v: "d", label: "🧠 Cenário semanal com recomendações" },
            { v: "e", label: "👁️ Acompanhar mercado, sem ação direta" },
        ]
    }
];

const PERFIS = {
    produtor: {
        icone: "🧑‍🌾",
        titulo: "Produtor / Pecuarista",
        desc: "Seu foco é proteger o preço da sua produção. Você receberá cenários de 30 a 90 dias, com alertas sobre clima, safra e as melhores janelas de venda. Menos barulho, mais estratégia."
    },
    fisico: {
        icone: "📦",
        titulo: "Físico (Comprador/Vendedor)",
        desc: "Você vive do curto prazo no físico. Receberá alertas diários com preços DATAGRO/CEPEA, tendências de 5 a 10 dias, e informações sobre oferta e demanda regional."
    },
    swinger: {
        icone: "📈",
        titulo: "Swinger B3",
        desc: "Você opera tendências nos contratos futuros. Terá AO VIVO com OHLC + Volume, força compradora, cenários de 10 a 30 dias, e setups de entrada com stop. Dados de CBOT e dólar em tempo real."
    },
    daytrade: {
        icone: "⚡",
        titulo: "Day Trade",
        desc: "Você vive do intraday. Receberá dados AO VIVO atualizados a cada 15 min, volume por candle, força compradora em tempo real, e sinais de entrada/saída no dia."
    },
    hedger: {
        icone: "🛡️",
        titulo: "Hedger (Indústria/Exportador)",
        desc: "Seu objetivo é se proteger da volatilidade. Receberá cenários de 30 a 180 dias, com análises de relação boi/milho, dólar, clima safra e recomendações de hedge."
    }
};

let atual = 0;
let respostas = {};
let calculando = false;

function renderizar() {
    const p = PERGUNTAS[atual];
    const container = document.getElementById("pergunta-container");
    const total = PERGUNTAS.length;
    document.getElementById("progresso").textContent = `Pergunta ${atual+1} de ${total}`;

    let html = `<div class="pergunta"><div class="rotulo">PERGUNTA ${atual+1}</div>
        <div class="texto">${p.texto}</div><div class="opcoes">`;

    for (const o of p.opcoes) {
        const sel = respostas[p.id] === o.v ? " selecionada" : "";
        html += `<label class="opcao${sel}">
            <input type="radio" name="${p.id}" value="${o.v}"
                ${respostas[p.id] === o.v ? "checked" : ""}
                onchange="selecionar('${p.id}','${o.v}')">
            ${o.label}
        </label>`;
    }

    html += `</div></div>`;
    container.innerHTML = html;
    document.getElementById("erro-msg").style.display = "none";

    const btn = document.getElementById("btn-proximo");
    if (atual === total - 1) {
        btn.textContent = "✅ Ver meu perfil";
    } else {
        btn.textContent = "Próximo →";
    }

    // Mostra botão pular só na primeira pergunta
    document.getElementById("btn-pular").style.display = atual === 0 ? "block" : "none";
}

function selecionar(id, valor) {
    respostas[id] = valor;
    // Re-renderiza pra mostrar seleção visual
    renderizar();
}

function proximo() {
    const p = PERGUNTAS[atual];
    if (!respostas[p.id]) {
        document.getElementById("erro-msg").style.display = "block";
        return;
    }
    document.getElementById("erro-msg").style.display = "none";

    if (atual < PERGUNTAS.length - 1) {
        atual++;
        renderizar();
    } else {
        // Todas respondidas — calcular perfil
        if (calculando) return;
        calculando = true;
        const btn = document.getElementById("btn-proximo");
        btn.disabled = true;
        btn.textContent = "Calculando...";
        calcularPerfil();
    }
}

function pular() {
    document.getElementById("tela-perguntas").style.display = "none";
    const r = document.getElementById("tela-resultado");
    r.style.display = "block";
    document.getElementById("resultado-icone").textContent = "🌱";
    document.getElementById("resultado-titulo").textContent = "Perfil não definido";
    document.getElementById("resultado-desc").textContent = "Você pode definir seu perfil depois a qualquer momento nas configurações da sua conta. Enquanto isso, você verá o dashboard padrão.";
}

async function calcularPerfil() {
    try {
        const r = await fetch("/api/auth/perfil/salvar", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({ respostas })
        });
        const data = await r.json();
        if (data.status !== "ok") throw new Error(data.detail || "Erro");

        const perfil = PERFIS[data.perfil];
        document.getElementById("tela-perguntas").style.display = "none";
        const tela = document.getElementById("tela-resultado");
        tela.style.display = "block";
        document.getElementById("resultado-icone").textContent = perfil.icone;
        document.getElementById("resultado-titulo").textContent = perfil.titulo;
        document.getElementById("resultado-desc").textContent = perfil.desc;
    } catch (e) {
        document.getElementById("erro-msg").textContent = "Erro ao salvar. Tente novamente.";
        document.getElementById("erro-msg").style.display = "block";
        calculando = false;
        document.getElementById("btn-proximo").disabled = false;
        document.getElementById("btn-proximo").textContent = "✅ Ver meu perfil";
    }
}

function irDashboard() {
    window.location.href = "/dashboard";
}

function voltarPerguntas() {
    atual = 0;
    respostas = {};
    calculando = false;
    document.getElementById("tela-resultado").style.display = "none";
    document.getElementById("tela-perguntas").style.display = "block";
    document.getElementById("btn-proximo").disabled = false;
    renderizar();
}

renderizar();
</script>
</body>
</html>
